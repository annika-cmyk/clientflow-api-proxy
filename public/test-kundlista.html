<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Kundlista</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Test Kundlista</h1>
        
        <div id="test-output">
            <p>Laddar kunddata...</p>
        </div>
        
        <div id="customer-list" class="risk-list">
            <!-- Test med statisk data -->
            <div class="risk-items">
                <div class="risk-item checked" data-customer-id="test1">
                    <div class="risk-item-header" onclick="toggleItem(this)">
                        <div class="risk-item-title">
                            <div class="risk-status-indicator checked">
                                ✓
                            </div>
                            <div class="risk-item-info">
                                <h4 class="risk-task-name">Test Kund 1</h4>
                                <div class="risk-meta-info">
                                    <span class="risk-level-badge">123456-7890</span>
                                    <span>Registrerad: 2024-01-01</span>
                                </div>
                            </div>
                        </div>
                        <div class="risk-item-actions">
                            <button class="expand-toggle" onclick="event.stopPropagation(); toggleItem(this.closest('.risk-item-header'))">
                                <i class="fas fa-chevron-down"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="risk-item-content">
                        <div class="risk-content-section">
                            <h5><i class="fas fa-building"></i> Kundinformation</h5>
                            <p class="risk-content-text">
                                <strong>Organisationsnummer:</strong> 123456-7890<br>
                                <strong>Byrå ID:</strong> 49<br>
                                <strong>Användar ID:</strong> test123
                            </p>
                        </div>
                        
                        <div class="risk-content-section">
                            <h5><i class="fas fa-sticky-note"></i> Anteckningar</h5>
                            <p class="risk-content-text">
                                Detta är en testkund
                            </p>
                        </div>
                        
                        <div class="risk-item-footer">
                            <button class="btn btn-secondary btn-sm">
                                <i class="fas fa-eye"></i>
                                Visa detaljer
                            </button>
                            <button class="btn btn-primary btn-sm">
                                <i class="fas fa-edit"></i>
                                Redigera
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleItem(headerElement) {
            const riskItem = headerElement.closest('.risk-item');
            const content = riskItem.querySelector('.risk-item-content');
            const expandToggle = headerElement.querySelector('.expand-toggle i');
            
            if (content.style.display === 'none' || !content.style.display) {
                content.style.display = 'block';
                expandToggle.className = 'fas fa-chevron-up';
            } else {
                content.style.display = 'none';
                expandToggle.className = 'fas fa-chevron-down';
            }
        }

        // Test API-anrop
        async function testAPI() {
            try {
                const response = await fetch('/api/kunddata');
                const data = await response.json();
                document.getElementById('test-output').innerHTML = `
                    <h3>API Response:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('test-output').innerHTML = `
                    <h3>API Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }

        // Kör test när sidan laddas
        document.addEventListener('DOMContentLoaded', () => {
            testAPI();
        });
    </script>
</body>
</html>
