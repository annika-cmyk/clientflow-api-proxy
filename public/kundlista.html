<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClientFlow • Kundlista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather+Sans:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <div class="sidebar-container"></div>

        <main class="main-content">
            <div class="container">

                <header class="content-header risk-header">
                    <div class="risk-header-content">
                        <h1>KUNDLISTA</h1>
                    </div>
                </header>

                <!-- Företagssök (samma som på dashboarden) -->
                <section class="kundlista-foretagssok-section">
                    <div class="dashboard-card dashboard-card-search">
                        <div class="dashboard-card-header">
                            <h2><i class="fas fa-search"></i> Företagssök</h2>
                        </div>
                        <div class="dashboard-card-body">
                            <p class="dashboard-card-desc">Hämta företagsdata från Bolagsverket via organisationsnummer och spara som kund.</p>
                            <form id="search-form" class="dashboard-search-form">
                                <div class="dashboard-search-row">
                                    <input type="text" id="org-number" name="org-number" placeholder="t.ex. 556722-3705" pattern="[0-9\-]{8,12}" required>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-search"></i> Hämta
                                    </button>
                                    <button type="button" id="clear-search" class="btn btn-secondary">
                                        <i class="fas fa-times"></i> Rensa
                                    </button>
                                </div>
                                <small>Format: 10 siffror, bindestreck tillåtna</small>
                            </form>
                        </div>
                    </div>
                </section>

                <section id="company-info" class="company-info-section" style="display: none;">
                    <div class="company-card">
                        <div class="company-header">
                            <h2 id="company-name-header"></h2>
                            <div class="company-actions">
                                <button id="save-to-airtable" class="btn btn-primary">
                                    <i class="fas fa-arrow-right"></i> Spara företag
                                </button>
                            </div>
                        </div>
                        <div id="company-details" class="company-details"></div>
                    </div>
                </section>

                <div class="kundlista-toolbar">
                    <div class="kundlista-search">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-filter" placeholder="Sök på namn eller organisationsnummer...">
                    </div>
                    <span class="kundlista-count"><span id="total-count">0</span> kunder</span>
                </div>

                <div id="customer-list">
                    <div class="kundlista-loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span>Laddar kunder...</span>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2024 ClientFlow. Alla rättigheter förbehållna.</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/components.js"></script>
    <script src="js/ai-chat.js"></script>
    <script src="app.js?v=2.1"></script>
    <script src="js/kundlista.js?v=2.1"></script>
</body>
</html>
