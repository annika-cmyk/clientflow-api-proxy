<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClientFlow • Kundkort</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather+Sans:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2.4">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar will be loaded dynamically -->
        <div class="sidebar-container">
            <!-- Sidebar content will be loaded here -->
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="container">
                <header class="content-header risk-header">
                    <div class="risk-header-content">
                        <h1>KUNDKORT</h1>
                        <h2 id="customer-name" class="kundkort-company-name">Laddar kundinformation...</h2>
                        <p id="customer-org-number" class="kundkort-orgnr"></p>
                    </div>
                </header>

                <!-- Customer Details Section -->
                <section class="customer-details-section">
                    <div class="container">
                        <!-- Tab Navigation -->
                        <div class="tab-navigation">
                            <button type="button" class="tab-button active" data-tab="foretagsinformation">
                                <i class="fas fa-info-circle"></i>
                                Företagsinformation
                            </button>
                            <button type="button" class="tab-button" data-tab="ovrigkyc">
                                <i class="fas fa-shield-alt"></i>
                                Riskbedömning
                            </button>
                            <button type="button" class="tab-button" data-tab="uppdragsavtal">
                                <i class="fas fa-file-signature"></i>
                                Uppdragsavtal
                            </button>
                            <button type="button" class="tab-button" data-tab="anteckningar">
                                <i class="fas fa-sticky-note"></i>
                                Anteckningar
                            </button>
                            <button type="button" class="tab-button" data-tab="avvikelser">
                                <i class="fas fa-exclamation-circle"></i>
                                Avvikelser
                            </button>
                            <button type="button" class="tab-button" data-tab="dokumentation">
                                <i class="fas fa-file-alt"></i>
                                Dokumentation
                            </button>
                        </div>

                        <!-- Tab Content -->
                        <div class="tab-content">
                            <!-- Företagsinformation Tab -->
                            <div id="foretagsinformation" class="tab-pane active">
                                <div id="foretagsinformation-content">
                                    <div class="loading-spinner">
                                        <i class="fas fa-spinner fa-spin"></i>
                                        <p>Laddar företagsinformation...</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Övrig KYC / Riskbedömning Tab -->
                            <div id="ovrigkyc" class="tab-pane">
                                <div id="ovrigkyc-content">
                                    <div class="loading-spinner">
                                        <i class="fas fa-spinner fa-spin"></i>
                                        <p>Laddar KYC-information...</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Uppdragsavtal Tab -->
                            <div id="uppdragsavtal" class="tab-pane">
                                <div id="uppdragsavtal-content">
                                    <div class="loading-spinner">
                                        <i class="fas fa-spinner fa-spin"></i>
                                        <p>Laddar uppdragsavtal...</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Anteckningar Tab -->
                            <div id="anteckningar" class="tab-pane">
                                <div id="notes-content">
                                    <div class="loading-spinner">
                                        <i class="fas fa-spinner fa-spin"></i>
                                        <p>Laddar anteckningar...</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Avvikelser Tab -->
                            <div id="avvikelser" class="tab-pane">
                                <div id="avvikelser-content">
                                    <div class="loading-spinner">
                                        <i class="fas fa-spinner fa-spin"></i>
                                        <p>Laddar avvikelser...</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Dokumentation Tab -->
                            <div id="dokumentation" class="tab-pane">
                                <div id="documents-content">
                                    <div class="loading-spinner">
                                        <i class="fas fa-spinner fa-spin"></i>
                                        <p>Laddar dokument...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2024 ClientFlow. Alla rättigheter förbehållna.</p>
        </div>
    </footer>

    <!-- Load scripts -->
    <script src="js/config.js?v=2.1"></script>
    <script src="js/auth.js?v=2.1"></script>
    <script src="js/navigation.js?v=2.1"></script>
    <script src="js/components.js?v=2.1"></script>
    <script src="js/ai-chat.js?v=2.1"></script>
    <script src="app.js?v=2.1"></script>
    <script src="js/kundkort.js?v=6.6"></script>
</body>
</html>
