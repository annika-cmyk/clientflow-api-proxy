<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Felsök Byråer schema</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    .error { color: #c00; }
    .ok { color: #080; }
    pre { background: #f5f5f5; padding: 1rem; overflow-x: auto; font-size: 0.85rem; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
    th { background: #eee; }
    .match { background: #e8f5e9; }
    .mismatch { background: #ffebee; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Byråer schema – jämför med FIELD_MAP</h1>
  <p>Öppna denna sida när du är inloggad. Klicka för att hämta schema och jämföra fältnamn.</p>
  <button id="fetch">Hämta schema och jämför</button>
  <div id="out"></div>

  <script>
    (function () {
      var baseUrl = (window.apiConfig && window.apiConfig.baseUrl) || '';
      var token = localStorage.getItem('authToken');
      var FIELD_MAP = [
        { id: 'fld-syfte-omfattning', airtable: '1. Syfte och Omfattning' },
        { id: 'fld-beskrivning', airtable: '2. Beskrivning av Byråns verksamhet' },
        { id: 'fld-antal-anstallda', airtable: 'Antal anställda', type: 'number' },
        { id: 'fld-omsattning', airtable: 'Omsättning', type: 'number' },
        { id: 'fld-antal-kundforetag', airtable: 'Antal kundföretag', type: 'number' },
        { id: 'fld-metod-riskbedomning', airtable: '3. Metod för Riskbedömning ' },
        { id: 'fld-identifierade-risker', airtable: '4. Identifierade Risker och Sårbarheter' },
        { id: 'fld-vardering-risk', airtable: '5. Värdering av sammantagen risk' },
        { id: 'fld-riskreducerande', airtable: '6. Riskreducerande Åtgärder och Rutiner' },
        { id: 'fld-utvardering', airtable: '7. Utvärdering och Uppdatering' },
        { id: 'fld-kommunikation-risk', airtable: '8. Kommunikation.' }
      ];

      document.getElementById('fetch').onclick = function () {
        var out = document.getElementById('out');
        if (!token) {
          out.innerHTML = '<p class="error">Du måste vara inloggad. Gå till inloggningssidan först.</p>';
          return;
        }
        out.innerHTML = '<p>Hämtar...</p>';
        fetch(baseUrl + '/api/debug/byraer-schema', {
          headers: { 'Authorization': 'Bearer ' + token }
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.error) {
              out.innerHTML = '<p class="error">' + (data.error || 'Okänt fel') + '</p>';
              return;
            }
            var schemaNames = (data.fields || []).map(function (f) { return f.name; });
            var writableTypes = ['singleLineText', 'multilineText', 'richText', 'number', 'rating', 'checkbox', 'date', 'dateTime', 'singleSelect', 'multipleSelects', 'url', 'email', 'phoneNumber', 'currency', 'percent'];
            var rows = FIELD_MAP.map(function (m) {
              var exact = schemaNames.indexOf(m.airtable) >= 0;
              var trimmed = schemaNames.find(function (n) { return n.trim() === m.airtable.trim(); });
              var match = exact || trimmed;
              var schemaField = (data.fields || []).find(function (f) { return f.name === m.airtable || (f.name && f.name.trim() === m.airtable.trim()); });
              var writable = schemaField ? writableTypes.indexOf(schemaField.type) >= 0 : '?';
              var displayName = schemaField ? schemaField.name : '-';
              var repr = function (s) {
                if (!s) return '';
                return s + ' (längd: ' + s.length + ', slutar med mellanslag: ' + (s.slice(-1) === ' ') + ')';
              };
              return '<tr class="' + (match ? 'match' : 'mismatch') + '">' +
                '<td>' + m.airtable + '</td>' +
                '<td>' + displayName + '</td>' +
                '<td>' + (match ? '✓' : '✗ Saknas') + '</td>' +
                '<td>' + (schemaField ? schemaField.type : '-') + '</td>' +
                '<td>' + writable + '</td>' +
                '<td>' + repr(m.airtable) + '</td>' +
                '</tr>';
            }).join('');
            out.innerHTML =
              '<p class="ok">Tabell: ' + (data.tableName || data.tableId || '-') + '</p>' +
              '<h2>Jämförelse FIELD_MAP ↔ Airtable schema</h2>' +
              '<table><thead><tr><th>FIELD_MAP.airtable</th><th>Airtable exakt namn</th><th>Matchar</th><th>Typ</th><th>Skrivbar</th><th>Debug (längd, mellanslag)</th></tr></thead><tbody>' + rows + '</tbody></table>' +
              '<h2>Alla fält i Byråer (Airtable)</h2><pre>' + JSON.stringify((data.fields || []).map(function (f) { return { name: f.name, type: f.type }; }), null, 2) + '</pre>';
          })
          .catch(function (err) {
            out.innerHTML = '<p class="error">Fel: ' + err.message + '</p>';
          });
      };
    })();
  </script>
</body>
</html>
