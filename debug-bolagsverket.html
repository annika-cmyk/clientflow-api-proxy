<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Bolagsverket API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button { padding: 10px 20px; margin: 5px; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; max-height: 400px; overflow-y: auto; }
        input { padding: 8px; margin: 5px; width: 200px; }
    </style>
</head>
<body>
    <h1>🔍 Debug Bolagsverket API</h1>
    
    <div class="test-section">
        <h2>Test Bolagsverket API Response</h2>
        <input type="text" id="org-number" placeholder="Organisationsnummer (t.ex. 5567223705)" value="5567223705">
        <button onclick="testBolagsverket()">Hämta Data</button>
        <div id="result"></div>
    </div>

    <script>
        const API_BASE = 'https://clientflow-api-proxy-1.onrender.com';
        
        async function testBolagsverket() {
            const orgNumber = document.getElementById('org-number').value.trim();
            if (!orgNumber) {
                alert('Ange ett organisationsnummer');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<span class="info">Hämtar data...</span>';
            
            try {
                const response = await fetch(`${API_BASE}/api/bolagsverket/organisationer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ organisationsnummer: orgNumber })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    console.log('Raw API Response:', data);
                    
                    // Extract the first organization
                    const orgs = Array.isArray(data.data) ? data.data : [data.data];
                    const primaryOrg = orgs[0];
                    
                    console.log('Primary Organization:', primaryOrg);
                    
                    // Check specific fields
                    console.log('Field Analysis:');
                    console.log('- verksamhetsbeskrivning:', primaryOrg?.verksamhetsbeskrivning);
                    console.log('- organisationsdatum:', primaryOrg?.organisationsdatum);
                    console.log('- organisationsform:', primaryOrg?.organisationsform);
                    console.log('- naringsgrenOrganisation:', primaryOrg?.naringsgrenOrganisation);
                    
                    resultDiv.innerHTML = `
                        <span class="success">✅ Data hämtad framgångsrikt!</span>
                        <h3>Full API Response:</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                        
                        <h3>Field Analysis:</h3>
                        <pre>
verksamhetsbeskrivning: ${JSON.stringify(primaryOrg?.verksamhetsbeskrivning, null, 2)}
organisationsdatum: ${JSON.stringify(primaryOrg?.organisationsdatum, null, 2)}
organisationsform: ${JSON.stringify(primaryOrg?.organisationsform, null, 2)}
naringsgrenOrganisation: ${JSON.stringify(primaryOrg?.naringsgrenOrganisation, null, 2)}
                        </pre>
                    `;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ API Error: ${response.status}</span><pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
